<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="A beautiful interactive voxel terrarium builder. Design your own miniature ecosystem." />
    <meta property="og:title" content="Voxel Terrarium" />
    <meta property="og:description" content="Design, grow, and share your own beautiful voxel terrarium." />
    <meta property="og:type" content="website" />
    <title>Terrarium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body {
        font-family: 'DM Sans', sans-serif;
        background: #1a1510;
        color: #e8e0d4;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1a1510;
        z-index: 1000;
        transition: opacity 0.8s ease;
      }
      #loading.fade-out { opacity: 0; pointer-events: none; }
      #loading h1 {
        font-family: 'Fraunces', serif;
        font-weight: 300;
        font-size: 2.5rem;
        letter-spacing: 0.05em;
        color: #c4b89a;
        margin-bottom: 1rem;
      }
      #loading p {
        font-size: 0.9rem;
        color: #8a7e6b;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading">
        <h1>Terrarium</h1>
        <p>Growing your garden...</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
