<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="A realistic terrarium sandbox — pour soil, water and sand into a glass aquarium, plant ferns and moss, and watch it grow." />
    <meta property="og:title" content="Terrarium" />
    <meta property="og:description" content="Pour, plant, grow — a realistic terrarium sandbox in your browser." />
    <title>Terrarium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body {
        font-family: 'DM Sans', sans-serif;
        background: #2b241b;
        color: #f0e9dc;
        -webkit-user-select: none;
        user-select: none;
      }
      #app { width: 100%; height: 100%; position: relative; }
      canvas { display: block; }

      /* soft photographic vignette, done in CSS so the GPU stays free */
      #app::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(ellipse at 50% 42%, transparent 52%, rgba(18, 12, 7, 0.5) 100%);
      }

      #loading {
        position: fixed; inset: 0; z-index: 100;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #2b241b;
        transition: opacity 0.7s ease;
      }
      #loading.fade-out { opacity: 0; pointer-events: none; }
      #loading h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 2.4rem; color: #d9c9a8; }
      #loading p { margin-top: 0.8rem; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: #97876d; }

      #brand {
        position: fixed; top: 18px; left: 22px; z-index: 10; pointer-events: none;
      }
      #brand h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 1.5rem; color: #f3e8d2; text-shadow: 0 1px 8px rgba(0,0,0,0.35); }
      #brand span { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(243, 232, 210, 0.65); }

      #stats {
        position: fixed; top: 74px; left: 22px; z-index: 10;
        display: flex; gap: 12px;
        padding: 7px 14px;
        background: rgba(28, 22, 14, 0.55);
        border: 1px solid rgba(255, 245, 220, 0.12);
        border-radius: 999px;
        backdrop-filter: blur(12px);
        font-size: 0.82rem;
        cursor: default;
      }
      #stats span { display: inline-flex; align-items: center; gap: 2px; }

      #toast {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-8px);
        z-index: 11;
        padding: 9px 18px;
        background: rgba(38, 30, 18, 0.78);
        border: 1px solid rgba(255, 225, 160, 0.22);
        border-radius: 999px;
        font-size: 0.85rem; color: #f5ecd8;
        backdrop-filter: blur(10px);
        opacity: 0; transition: opacity 0.4s, transform 0.4s;
        pointer-events: none;
        white-space: nowrap;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      .chip.wide { width: auto; padding: 0 12px; font-size: 0.9rem; font-weight: 600; }

      #alerts {
        position: fixed; top: 122px; left: 22px; z-index: 10;
        display: flex; flex-direction: column; gap: 6px;
        max-width: 320px;
      }
      .alert {
        padding: 8px 14px;
        background: rgba(74, 50, 16, 0.72);
        border: 1px solid rgba(255, 196, 110, 0.45);
        border-radius: 12px;
        font-size: 0.8rem; color: #ffe2b8;
        backdrop-filter: blur(10px);
        animation: alertIn 0.4s ease;
      }
      @keyframes alertIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }

      .overlay {
        position: fixed; inset: 0; z-index: 50;
        display: none;
        align-items: center; justify-content: center;
        background: rgba(16, 11, 6, 0.55);
        backdrop-filter: blur(4px);
      }
      .overlay.open { display: flex; }
      .overlay-card {
        position: relative;
        width: min(560px, calc(100vw - 40px));
        max-height: min(78vh, 700px);
        overflow-y: auto;
        padding: 30px 34px;
        background: rgba(42, 33, 22, 0.92);
        border: 1px solid rgba(255, 235, 195, 0.18);
        border-radius: 20px;
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      }
      .overlay-card h2 {
        font-family: 'Fraunces', serif; font-weight: 500;
        font-size: 1.45rem; color: #f3e6c8; margin-bottom: 0.7rem;
      }
      .overlay-card h3 {
        font-family: 'Fraunces', serif; font-weight: 500;
        font-size: 1.05rem; color: #e8cf9e; margin: 1.2rem 0 0.35rem;
      }
      .overlay-card p {
        font-size: 0.86rem; line-height: 1.55; color: rgba(240, 230, 210, 0.88);
        margin-bottom: 0.4rem;
      }
      .overlay-card b { color: #f5e7c6; }
      .overlay-close {
        position: absolute; top: 14px; right: 16px;
        width: 34px; height: 34px;
        border: none; border-radius: 50%;
        background: rgba(255, 235, 195, 0.1);
        color: #f0e0c0; font-size: 1.3rem; line-height: 1;
        cursor: pointer;
      }
      .overlay-close:hover { background: rgba(255, 235, 195, 0.22); }
      .overlay-card .sub {
        font-size: 0.78rem; color: rgba(232, 207, 158, 0.75);
        margin: -0.4rem 0 0.8rem;
      }
      .overlay-card ul.away {
        list-style: none; margin: 0.4rem 0 0.8rem;
      }
      .overlay-card ul.away li {
        font-size: 0.88rem; line-height: 1.7; color: rgba(240, 230, 210, 0.9);
      }
      .journal-entry {
        display: flex; gap: 12px; align-items: baseline;
        padding: 7px 0;
        border-bottom: 1px solid rgba(255, 235, 195, 0.08);
        font-size: 0.84rem; color: rgba(240, 230, 210, 0.88);
      }
      .journal-entry .when {
        flex: 0 0 86px;
        font-size: 0.72rem; color: rgba(232, 207, 158, 0.65);
        white-space: nowrap;
      }
      .fg-entry {
        padding: 8px 0 4px;
        border-bottom: 1px solid rgba(255, 235, 195, 0.07);
      }
      .fg-head { font-size: 0.9rem; color: #f3e6c8; margin-bottom: 0.15rem; }
      .fg-head .emoji { margin-right: 6px; }
      .fg-head i { color: rgba(232, 207, 158, 0.85); font-size: 0.82rem; margin-left: 4px; }
      .fg-fam {
        font-size: 0.68rem; color: rgba(240, 230, 210, 0.5);
        margin-left: 6px; letter-spacing: 0.06em;
      }
      .fg-entry p { font-size: 0.82rem; }
      .fg-care { color: rgba(232, 207, 158, 0.8) !important; font-size: 0.76rem !important; }
      .fg-wet { font-family: monospace; font-size: 0.7rem; letter-spacing: 0.05em; }

      #topbar {
        position: fixed; top: 18px; right: 18px; z-index: 10;
        display: flex; gap: 10px;
      }
      .seg {
        display: flex; gap: 4px; padding: 5px;
        background: rgba(28, 22, 14, 0.55);
        border: 1px solid rgba(255, 245, 220, 0.12);
        border-radius: 14px;
        backdrop-filter: blur(12px);
      }
      .chip {
        width: 40px; height: 40px;
        border: none; border-radius: 10px;
        background: transparent;
        color: #f0e9dc; font-size: 1.15rem;
        cursor: pointer;
        transition: background 0.15s;
      }
      .chip:hover { background: rgba(255, 245, 220, 0.12); }
      .chip.active { background: rgba(255, 215, 140, 0.22); }

      #toolbar {
        position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
        z-index: 10;
        display: flex; gap: 14px; align-items: flex-end;
        padding: 10px 14px;
        background: rgba(28, 22, 14, 0.55);
        border: 1px solid rgba(255, 245, 220, 0.12);
        border-radius: 18px;
        backdrop-filter: blur(12px);
        max-width: calc(100vw - 24px);
        overflow-x: auto;
        scrollbar-width: none;
      }
      #toolbar::-webkit-scrollbar { display: none; }
      .group-title {
        font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase;
        color: rgba(240, 233, 220, 0.5);
        margin: 0 0 6px 4px; height: 0.8em;
      }
      .row { display: flex; gap: 4px; flex-wrap: wrap; max-width: 420px; justify-content: center; }
      .tool {
        display: flex; flex-direction: column; align-items: center; gap: 3px;
        min-width: 50px; padding: 7px 5px 5px;
        border: none; border-radius: 12px;
        background: transparent; color: #f0e9dc;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
      }
      .tool:hover { background: rgba(255, 245, 220, 0.1); }
      .tool.active { background: rgba(255, 215, 140, 0.22); }
      .tool:active { transform: scale(0.96); }
      .tool .emoji { font-size: 1.25rem; line-height: 1.3rem; }
      .tool .swatch {
        width: 20px; height: 20px; border-radius: 50%;
        margin: 0.05rem 0;
        border: 2px solid rgba(255, 255, 255, 0.35);
        box-shadow: inset 0 -3px 5px rgba(0,0,0,0.25);
      }
      .tool label { font-size: 0.66rem; color: rgba(240, 233, 220, 0.85); pointer-events: none; }

      #hint {
        position: fixed; bottom: 112px; left: 50%; transform: translateX(-50%);
        z-index: 9;
        padding: 8px 16px;
        background: rgba(28, 22, 14, 0.65);
        border: 1px solid rgba(255, 245, 220, 0.1);
        border-radius: 999px;
        font-size: 0.8rem; color: rgba(240, 233, 220, 0.9);
        backdrop-filter: blur(8px);
        opacity: 0; transition: opacity 0.3s;
        pointer-events: none;
        white-space: nowrap;
      }
      #hint.show { opacity: 1; }

      @media (max-width: 760px) {
        .tool { min-width: 46px; }
        .tool label { font-size: 0.6rem; }
        #brand span { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading">
        <h1>Terrarium</h1>
        <p>Preparing the glass&hellip;</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
